# Cloud Build pipeline for Lore
# Triggered on push to main branch.
# Builds the server Docker image, pushes to Artifact Registry,
# and deploys to Cloud Run.
#
# Required substitution variables (set in Cloud Build trigger):
#   _REGION          e.g. us-central1
#   _SERVICE_NAME    e.g. lore-server
#   _ARTIFACT_REPO   e.g. lore-repo  (Artifact Registry Docker repo)
#
# Required IAM roles for the Cloud Build service account:
#   - Cloud Run Admin
#   - Artifact Registry Writer
#   - Service Account User

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: lore-server
  _ARTIFACT_REPO: lore-repo

steps:
  # 1. Build the server Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"
      - ./server
    id: build

  # 2. Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}"
    id: push
    waitFor: [build]

  # 3. Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
      - --region
      - "${_REGION}"
      - --platform
      - managed
      - --allow-unauthenticated
      - --session-affinity          # Required for WebSocket connections
      - --timeout
      - "300"                       # 5-min WebSocket session timeout
      - --min-instances
      - "1"                         # Keep warm to avoid cold-start latency
      - --max-instances
      - "10"
      - --set-env-vars
      - "GOOGLE_CLOUD_PROJECT=$PROJECT_ID"
    id: deploy
    waitFor: [push]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
